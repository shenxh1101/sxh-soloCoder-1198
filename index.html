<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNTH-X1 虚拟合成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="synth-container">
    <header class="synth-header">
      <div class="brand-line"></div>
      <h1 class="synth-title">SYNTH<span class="title-accent">-</span>X1</h1>
      <p class="synth-subtitle">VIRTUAL ANALOG SYNTHESIZER</p>
      <div class="brand-line"></div>
    </header>

    <section class="oscilloscope-section">
      <div class="scope-panel">
        <div class="scope-label">OSCILLOSCOPE</div>
        <canvas id="oscilloscope" class="scope-canvas"></canvas>
      </div>
    </section>

    <div class="playback-progress" id="playbackProgress" style="display:none">
      <input type="range" id="progressBar" class="progress-slider" min="0" max="1000" value="0">
      <span class="beat-position" id="beatPosition" style="display:none"></span>
      <span class="progress-time" id="progressTime">0:00.0 / 0:00.0</span>
    </div>

    <section class="keyboard-section">
      <div class="keys-container" id="keysContainer">
        <button class="key-btn" data-note="0" data-key="1">
          <span class="key-note">C4</span>
          <span class="key-hint">1</span>
        </button>
        <button class="key-btn" data-note="1" data-key="2">
          <span class="key-note">D4</span>
          <span class="key-hint">2</span>
        </button>
        <button class="key-btn" data-note="2" data-key="3">
          <span class="key-note">E4</span>
          <span class="key-hint">3</span>
        </button>
        <button class="key-btn" data-note="3" data-key="4">
          <span class="key-note">F4</span>
          <span class="key-hint">4</span>
        </button>
        <button class="key-btn" data-note="4" data-key="5">
          <span class="key-note">G4</span>
          <span class="key-hint">5</span>
        </button>
        <button class="key-btn" data-note="5" data-key="6">
          <span class="key-note">A4</span>
          <span class="key-hint">6</span>
        </button>
        <button class="key-btn" data-note="6" data-key="7">
          <span class="key-note">B4</span>
          <span class="key-hint">7</span>
        </button>
        <button class="key-btn" data-note="7" data-key="8">
          <span class="key-note">C5</span>
          <span class="key-hint">8</span>
        </button>
      </div>
    </section>

    <div class="controls-grid">
      <section class="control-panel waveform-panel">
        <h3 class="panel-title">WAVEFORM</h3>
        <div class="waveform-options" id="waveformOptions">
          <button class="wave-btn active" data-wave="sine">
            <span class="wave-icon sine-icon"></span>
            <span class="wave-name">SINE</span>
          </button>
          <button class="wave-btn" data-wave="square">
            <span class="wave-icon square-icon"></span>
            <span class="wave-name">SQUARE</span>
          </button>
          <button class="wave-btn" data-wave="sawtooth">
            <span class="wave-icon saw-icon"></span>
            <span class="wave-name">SAW</span>
          </button>
          <button class="wave-btn" data-wave="triangle">
            <span class="wave-icon tri-icon"></span>
            <span class="wave-name">TRI</span>
          </button>
        </div>
      </section>

      <section class="control-panel adsr-panel">
        <h3 class="panel-title">ADSR ENVELOPE</h3>
        <div class="adsr-sliders">
          <div class="slider-group">
            <label class="slider-label">ATTACK</label>
            <input type="range" id="attack" class="adsr-slider" min="0" max="200" value="1" step="1">
            <span class="slider-value" id="attackVal">0.01s</span>
          </div>
          <div class="slider-group">
            <label class="slider-label">DECAY</label>
            <input type="range" id="decay" class="adsr-slider" min="0" max="200" value="10" step="1">
            <span class="slider-value" id="decayVal">0.10s</span>
          </div>
          <div class="slider-group">
            <label class="slider-label">SUSTAIN</label>
            <input type="range" id="sustain" class="adsr-slider" min="0" max="100" value="80" step="1">
            <span class="slider-value" id="sustainVal">0.80</span>
          </div>
          <div class="slider-group">
            <label class="slider-label">RELEASE</label>
            <input type="range" id="release" class="adsr-slider" min="0" max="200" value="20" step="1">
            <span class="slider-value" id="releaseVal">0.20s</span>
          </div>
        </div>
      </section>

      <section class="control-panel preset-panel">
        <h3 class="panel-title">PRESETS</h3>
        <div class="preset-buttons" id="presetButtons">
          <button class="preset-btn" data-preset="piano">PIANO</button>
          <button class="preset-btn" data-preset="organ">ORGAN</button>
          <button class="preset-btn" data-preset="electronic">ELECTRONIC</button>
        </div>
      </section>

      <section class="control-panel effects-panel">
        <h3 class="panel-title">EFFECTS</h3>
        <div class="effects-sliders">
          <div class="slider-group">
            <label class="slider-label">REVERB</label>
            <input type="range" id="reverbMix" class="effect-slider" min="0" max="100" value="30" step="1">
            <span class="slider-value" id="reverbMixVal">30%</span>
          </div>
          <div class="slider-group">
            <label class="slider-label">DELAY MIX</label>
            <input type="range" id="delayMix" class="effect-slider" min="0" max="100" value="20" step="1">
            <span class="slider-value" id="delayMixVal">20%</span>
          </div>
          <div class="slider-group">
            <label class="slider-label">DELAY TIME</label>
            <input type="range" id="delayTime" class="effect-slider" min="5" max="100" value="30" step="1">
            <span class="slider-value" id="delayTimeVal">0.30s</span>
          </div>
        </div>
      </section>

      <section class="control-panel timbre-panel">
        <h3 class="panel-title">TIMBRE SCHEMES</h3>
        <div class="timbre-controls">
          <select id="timbreSelect" class="timbre-select">
            <option value="">-- 选择方案 --</option>
          </select>
          <div class="timbre-info-line">
            <button id="favoriteBtn" class="favorite-btn" style="display:none">&#9734;</button>
            <span id="timbreInfo" class="timbre-info-text" style="display:none"></span>
          </div>
          <div class="timbre-buttons">
            <button id="saveTimbreBtn" class="timbre-action-btn">保存方案</button>
            <button id="deleteTimbreBtn" class="timbre-action-btn timbre-delete">删除</button>
          </div>
        </div>
      </section>

      <section class="control-panel recorder-panel">
        <h3 class="panel-title">RECORDER</h3>
        <div class="recorder-controls">
          <button id="recordBtn" class="rec-btn rec-record" title="录制">
            <span class="rec-icon">⏺</span>
          </button>
          <button id="stopBtn" class="rec-btn rec-stop" title="停止" disabled>
            <span class="rec-icon">⏹</span>
          </button>
          <button id="playBtn" class="rec-btn rec-play" title="回放">
            <span class="rec-icon">▶</span>
          </button>
          <button id="clearBtn" class="rec-btn rec-clear" title="清除">
            <span class="rec-icon">✕</span>
          </button>
        </div>
        <div class="recorder-status">
          <span id="recIndicator" class="rec-indicator"></span>
          <span id="recStatus" class="rec-status-text">就绪</span>
        </div>
        <div class="metro-controls">
          <button id="metronomeBtn" class="metro-btn" title="节拍器">&#9833; 节拍器</button>
          <button id="countInBtn" class="metro-btn" title="录制前倒计时 1 小节">倒计时</button>
        </div>
        <div class="file-controls">
          <button id="exportBtn" class="file-btn">导出 JSON</button>
          <button id="importBtn" class="file-btn">导入 JSON</button>
        </div>
      </section>

      <section class="control-panel timeline-panel">
        <h3 class="panel-title">TIMELINE EDITOR</h3>
        <div class="segments-bar">
          <div class="segments-tabs" id="segmentsContainer"></div>
          <div class="segments-actions">
            <button id="addSegmentBtn" class="segment-action-btn" title="新建片段">+</button>
            <button id="copySegmentBtn" class="segment-action-btn" title="复制片段">⧉</button>
            <button id="deleteSegmentBtn" class="segment-action-btn segment-del" title="删除片段">×</button>
            <button id="loopSegmentBtn" class="segment-action-btn" title="循环播放">LOOP</button>
          </div>
        </div>
        <div class="segment-options" id="segmentOptions">
          <button id="renameSegBtn" class="segment-action-btn">改名</button>
          <button id="moveSegUpBtn" class="segment-action-btn" title="上移">▲</button>
          <button id="moveSegDownBtn" class="segment-action-btn" title="下移">▼</button>
          <label class="repeat-label">重复</label>
          <input type="number" id="repeatCount" class="repeat-input" value="1" min="1" max="99" step="1">
          <button id="playAllBtn" class="segment-action-btn play-all-btn" title="播放全部片段">▶全部</button>
        </div>
        <div class="quantize-bar">
          <span class="quantize-label">拍号:</span>
          <select id="timesigNum" class="timesig-select">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
          <span class="timesig-slash">/</span>
          <select id="timesigDen" class="timesig-select">
            <option value="4" selected>4</option>
            <option value="8">8</option>
          </select>
          <input type="number" id="bpmInput" class="bpm-input" value="120" min="40" max="300" step="1" title="BPM">
          <span class="quantize-label">BPM</span>
          <button id="quantize4Btn" class="quantize-btn">1/4</button>
          <button id="quantize8Btn" class="quantize-btn">1/8</button>
          <button id="quantize16Btn" class="quantize-btn">1/16</button>
          <button id="undoQuantizeBtn" class="quantize-btn quantize-undo" disabled>撤销</button>
        </div>
        <div class="timeline-wrap" id="timelineWrap">
          <canvas id="timelineCanvas" class="timeline-canvas"></canvas>
        </div>
        <div class="timeline-edit" id="timelineEdit" style="display:none">
          <div class="edit-row">
            <label class="edit-label">音符</label>
            <select id="editNoteIndex" class="edit-select">
              <option value="0">C4</option>
              <option value="1">D4</option>
              <option value="2">E4</option>
              <option value="3">F4</option>
              <option value="4">G4</option>
              <option value="5">A4</option>
              <option value="6">B4</option>
              <option value="7">C5</option>
            </select>
          </div>
          <div class="edit-row">
            <label class="edit-label">开始(s)</label>
            <input type="number" id="editStartTime" class="edit-input" step="0.01" min="0">
          </div>
          <div class="edit-row">
            <label class="edit-label">时长(s)</label>
            <input type="number" id="editDuration" class="edit-input" step="0.01" min="0.01">
          </div>
          <div class="edit-info">总时长: <span id="editTotalDur">0s</span></div>
          <div class="edit-actions">
            <button id="applyEditBtn" class="edit-action-btn">应用</button>
            <button id="deleteEditBtn" class="edit-action-btn edit-delete">删除</button>
          </div>
        </div>
      </section>
    </div>

    <footer class="synth-footer">
      <span>按下键盘 1-8 演奏 | 双击片段标签改名 | 拖动进度条跳转</span>
    </footer>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none">

  <div class="import-dialog" id="importDialog" style="display:none">
    <div class="import-dialog-content">
      <h3 class="import-dialog-title">导入选项</h3>
      <p class="import-dialog-desc">检测到文件中包含音色设置，请选择导入方式：</p>
      <label class="import-radio">
        <input type="radio" name="importMode" value="recording" checked>
        <span>仅导入录音</span>
      </label>
      <label class="import-radio">
        <input type="radio" name="importMode" value="full">
        <span>导入录音和音色设置</span>
      </label>
      <div class="import-dialog-actions">
        <button id="importConfirm" class="import-dialog-btn import-confirm">确认</button>
        <button id="importCancel" class="import-dialog-btn import-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="js/presets.js"></script>
  <script src="js/audioEngine.js"></script>
  <script src="js/oscilloscope.js"></script>
  <script src="js/timbreManager.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
